    color: var(--text); font-size: 18px; display: flex; align-items: center; justify-content: center;

  .theme-toggle:hover { background: var(--card2); transform: scale(1.1); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .header h1 span { color: var(--accent); }
  .header-meta { color: var(--muted); font-size: 13px; }
  .stats-bar { display: flex; gap: 20px; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat-val { font-size: 22px; font-weight: 700; color: var(--accent); }
  .stat-val.hot { color: var(--hot); }
  .stat-val.new { color: var(--green); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

  /* Tabs */
  .tabs { display: flex; gap: 2px; background: var(--card); border-bottom: 1px solid var(--border); padding: 0 20px; }
  .tab { padding: 12px 16px; cursor: pointer; color: var(--muted); font-size: 13px; font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Filter bar */
  .filter-bar { background: var(--card); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 12px; transition: all 0.15s; }
  .filter-btn:hover, .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .filter-btn.hot-filter.active { background: var(--hot); border-color: var(--hot); }
  .search-box { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 12px; outline: none; width: 200px; }
  .search-box:focus { border-color: var(--accent); }

  /* Listings grid */
  .listings { padding: 16px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 14px; }

  /* Card */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; position: relative; transition: border-color 0.15s; }
  .card:hover { border-color: var(--accent); }
  .card.dismissed { display: none; }
  .card.bookmarked { border-color: var(--top); }
  .card.top-deal { border-left: 3px solid var(--top); }
  .card.hot-deal { border-left: 3px solid var(--hot); }

  /* Card header */
  .card-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
  .card-title { flex: 1; font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .card-title a { color: var(--text); }
  .card-title a:hover { color: var(--accent); text-decoration: none; }
  .card-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .btn-icon { background: transparent; border: none; cursor: pointer; color: var(--muted); font-size: 16px; padding: 2px 4px; line-height: 1; transition: color 0.15s; }
  .btn-icon:hover { color: var(--text); }
  .btn-icon.bookmarked { color: var(--top); }

  /* Badges */
  .badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
  .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
  .badge-new { background: rgba(79,207,142,0.2); color: var(--green); border: 1px solid rgba(79,207,142,0.3); }
  .badge-price-drop { background: rgba(247,79,79,0.2); color: var(--red); border: 1px solid rgba(247,79,79,0.3); }
  .badge-seen { background: rgba(107,114,128,0.2); color: var(--gray); border: 1px solid rgba(107,114,128,0.3); }
  .badge-auction { background: rgba(249,115,22,0.2); color: #f97316; border: 1px solid rgba(249,115,22,0.3); }
  .badge-hot { background: rgba(247,147,79,0.2); color: var(--hot); border: 1px solid rgba(247,147,79,0.3); }
  .badge-top { background: rgba(247,192,79,0.2); color: var(--top); border: 1px solid rgba(247,192,79,0.3); }
  .badge-type { background: rgba(79,142,247,0.15); color: var(--accent); border: 1px solid rgba(79,142,247,0.25); }
  .badge-sf { background: rgba(79,207,142,0.15); color: #34d399; border: 1px solid rgba(79,207,142,0.25); }

  /* Price row */
  .price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
  .price { font-size: 20px; font-weight: 700; color: #fff; }
  .old-price { font-size: 14px; color: var(--muted); text-decoration: line-through; }
  .drop-pct { font-size: 12px; color: var(--red); font-weight: 600; }

  /* Details grid */
  .details { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 12px; margin-bottom: 10px; }
  .detail { font-size: 12px; color: var(--muted); }
  .detail strong { color: var(--text); }
  .detail.cap { color: var(--green); font-weight: 600; }

  /* Score bar */
  .score-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .score-label { font-size: 11px; color: var(--muted); width: 40px; flex-shrink: 0; }
  .score-bar-wrap { flex: 1; background: rgba(255,255,255,0.06); border-radius: 4px; height: 6px; }

  .score-num { font-size: 12px; font-weight: 700; width: 24px; text-align: right; }

  /* Snippet */
  .snippet { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 8px; border-top: 1px solid var(--border); padding-top: 8px; }

  /* Contact */
  .contact { font-size: 12px; color: var(--muted); }
  .contact strong { color: var(--text); }

  .source-tag { font-size: 11px; color: var(--muted); }
  .view-btn { font-size: 11px; color: var(--accent); font-weight: 600; }

  .archive-list { padding: 20px; display: grid; gap: 10px; max-width: 600px; }

  .archive-meta { font-size: 12px; color: var(--muted); }

  .empty { padding: 60px 20px; text-align: center; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  @media (max-width: 600px) {

// ─── STATE ──────────────────────────────────────────────────────────────────
const dismissed = new Set(JSON.parse(localStorage.getItem('dismissed') || '[]'));
const bookmarks = new Set(JSON.parse(localStorage.getItem('bookmarks') || '[]'));
let currentFilter = 'all';
let searchQuery = '';

function saveState() {
  localStorage.setItem('dismissed', JSON.stringify([...dismissed]));
  localStorage.setItem('bookmarks', JSON.stringify([...bookmarks]));
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function scoreColor(s) {
  if (s >= 9) return '#f7c04f';
  if (s >= 7) return '#f7934f';
  if (s >= 5) return '#4f8ef7';
  return '#6b7280';
}

function formatPrice(p) {
  if (!p) return 'Call for Price';
  if (p >= 1000000) return '$' + (p/1000000).toFixed(2).replace(/\.?0+$/, '') + 'M';
  return '$' + p.toLocaleString();
}

function renderCard(l) {
  const isBookmarked = bookmarks.has(l.id);
    const seenEntry = SEEN_INDEX.find(s => s.name === l.name);
    const firstSeen = seenEntry ? seenEntry.firstSeen : null;
    let dateHtml = '';
    if (firstSeen) {
      const fs = new Date(firstSeen + 'T00:00:00');
      const today = new Date(); today.setHours(0,0,0,0);
      const dom = Math.round((today - fs) / 86400000);
      const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][fs.getMonth()];
      dateHtml = `<div class="listing-date">Listed: ${mo} ${fs.getDate()}, ${fs.getFullYear()}${dom > 0 ? ` <span class="dom">${dom} day${dom!==1?'s':''} on market</span>` : ' <span class="dom">NEW TODAY</span>'}</div>`;
    }
  const cardClass = ['card', l.score >= 9 ? 'top-deal' : l.score >= 7 ? 'hot-deal' : '', dismissed.has(l.id) ? 'dismissed' : '', isBookmarked ? 'bookmarked' : ''].filter(Boolean).join(' ');

  const badges = [];
  if (l.isNew) badges.push('<span class="badge badge-new">NEW</span>');
  if (l.priceChanged) badges.push(`<span class="badge badge-price-drop">PRICE DROP ▼</span>`);
  if (l.isRepeat && !l.priceChanged) badges.push('<span class="badge badge-seen">SEEN BEFORE</span>');
  if (l.isAuction) badges.push('<span class="badge badge-auction">AUCTION</span>');
  if (l.score >= 9) badges.push('<span class="badge badge-top">⭐ TOP DEAL</span>');
  else if (l.score >= 7) badges.push('<span class="badge badge-hot">🔥 HOT</span>');
  if (l.sellerFinancing) badges.push('<span class="badge badge-sf">Seller Fin</span>');

  const priceBlock = l.priceChanged && l.oldPrice
    ? `<div class="price-row"><span class="price">${l.priceText}</span><span class="old-price">${formatPrice(l.oldPrice)}</span><span class="drop-pct">▼${Math.round((1-l.price/l.oldPrice)*100)}%</span></div>`
    : `<div class="price-row"><span class="price">${l.priceText}</span></div>`;

  const detailItems = [
    l.location ? `<div class="detail">📍 <strong>${l.location}</strong></div>` : '',
    l.lots ? `<div class="detail">📊 <strong>${l.lots} lots/sites</strong></div>` : '',
    l.capRate ? `<div class="detail cap">📈 Cap Rate: <strong>${l.capRate}</strong></div>` : '',
    l.occupancy ? `<div class="detail">🏠 Occupancy: <strong>${l.occupancy}</strong></div>` : '',
    l.hasWaterfront ? `<div class="detail">💧 <strong>Waterfront</strong></div>` : '',
    l.nearTourism ? `<div class="detail">🎯 <strong>Near Tourism</strong></div>` : '',
    l.nearInterstate ? `<div class="detail">🛣️ <strong>Near Interstate</strong></div>` : '',
  ].filter(Boolean).join('');

  const tagHTML = l.tags.map(t => `<span class="badge badge-type">${t}</span>`).join('');

  return `
  <div class="${cardClass}" data-id="${l.id}" data-type="${l.type}" data-new="${l.isNew}" data-sf="${l.sellerFinancing}" data-score="${l.score}" data-name="${l.name.toLowerCase()} ${l.location.toLowerCase()}">
    <div class="card-header">
      <div class="card-title"><a href="${l.url}" target="_blank">${l.name}</a></div>
      <div class="card-actions">
        <button class="btn-icon ${isBookmarked ? 'bookmarked' : ''}" title="${isBookmarked ? 'Remove bookmark' : 'Bookmark'}" onclick="toggleBookmark('${l.id}', this)">${isBookmarked ? '★' : '☆'}</button>
        <button class="btn-icon" title="Dismiss" onclick="dismiss('${l.id}', this)">✕</button>
      </div>
    </div>
    <div class="badges">${badges.join('')}</div>
    ${priceBlock}
    <div class="details">${detailItems}</div>
    <div class="score-row">
      <span class="score-label">Score</span>
      <div class="score-bar-wrap"><div class="score-bar" style="width:${l.score*10}%;background:${scoreColor(l.score)}"></div></div>
      <span class="score-num" style="color:${scoreColor(l.score)}">${l.score}/10</span>
    </div>
    <div class="badges">${tagHTML}</div>
    <div class="snippet">${l.snippet}</div>
    ${l.contact && l.contact.name ? `<div class="contact">👤 <strong>${l.contact.name}</strong>${l.contact.firm ? ' · ' + l.contact.firm : ''}${l.contact.phone ? ' · ' + l.contact.phone : ''}</div>` : ''}
    
    ${dateHtml}
    <div class="card-footer">
      <span class="source-tag">${l.source}</span>
      <a class="view-btn" href="${l.url}" target="_blank">View Listing →</a>
    </div>
  </div>`;
}

function getFiltered() {
  return LISTINGS.filter(l => {
    if (dismissed.has(l.id)) return false;
    if (currentFilter === 'hot' && l.score < 7) return false;
    if (currentFilter === 'new' && !l.isNew) return false;
    if (currentFilter === 'sf' && !l.sellerFinancing) return false;
    if (currentFilter === 'rv' && l.type !== 'rv') return false;
    if (currentFilter === 'mhp' && l.type !== 'mhp') return false;
    if (currentFilter === 'storage' && l.type !== 'storage') return false;
    if (currentFilter === 'marina' && l.type !== 'marina') return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const haystack = (l.name + ' ' + l.location + ' ' + l.snippet + ' ' + l.tags.join(' ')).toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
}

function renderListings() {
  const filtered = getFiltered();
  const grid = document.getElementById('listings-grid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div>No listings match your filter.</div></div>';
  } else {
    grid.innerHTML = filtered.map(renderCard).join('');
  }
  updateStats();
  setTimeout(function(){if(typeof window.injectPanels==='function')window.injectPanels();},50);
}

function renderBookmarks() {
  const bookmarked = LISTINGS.filter(l => bookmarks.has(l.id));
  const grid = document.getElementById('bookmarks-grid');
  if (!bookmarked.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">⭐</div><div>No bookmarks yet. Star listings to save them here.</div></div>';
  } else {
    grid.innerHTML = bookmarked.map(renderCard).join('');
  }
}

function renderArchive() {
    const list = document.getElementById('archive-list');
    list.innerHTML = ARCHIVE_INDEX.slice().reverse().map(a => `
      <div class="archive-item ${a.isToday ? 'today' : ''}">
        <div>
          <div class="archive-date">${a.isToday ? '📅 Today — ' : '📁 '}${a.date}</div>
          <div class="archive-meta">${a.count} listings</div>
        </div>
        <span class="archive-link">${a.isToday ? 'Current' : 'Archived'}</span>
      </div>`).join('');
  }

function updateStats() {
  const allActive = LISTINGS.filter(l => !dismissed.has(l.id));
  document.getElementById('stat-new').textContent = allActive.filter(l => l.isNew).length;
  document.getElementById('stat-hot').textContent = allActive.filter(l => l.score >= 7).length;
  document.getElementById('stat-total').textContent = allActive.length;
  document.getElementById('stat-seen').textContent = allActive.filter(l => l.isRepeat).length;
}

// ─── ACTIONS ────────────────────────────────────────────────────────────────
function dismiss(id, btn) {
  dismissed.add(id);
  saveState();
  const card = btn.closest('.card');
  card.style.opacity = '0';
  card.style.transform = 'scale(0.95)';
  card.style.transition = 'all 0.2s';
  setTimeout(() => renderListings(), 220);
}

function toggleBookmark(id, btn) {
  if (bookmarks.has(id)) {
    bookmarks.delete(id);
    btn.classList.remove('bookmarked');
    btn.textContent = '☆';
  } else {
    bookmarks.add(id);
    btn.classList.add('bookmarked');
    btn.textContent = '★';
  }
  saveState();
  renderBookmarks();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderListings();
}

function searchListings(q) {
  searchQuery = q;
  renderListings();
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'bookmarks') renderBookmarks();
  if (tab === 'archive') renderArchive();
}

// ─── INIT ───────────────────────────────────────────────────────────────────
renderListings();
renderArchive();


  // === Send Inquiry Workflow ===
  function sendInquiry(idx) {
    var l = LISTINGS[idx];
    if (!l) return;
    
    // Store inquiry request for AI agent to pick up
    window._inquiryRequest = {
      dealName: l.name,
      location: l.location,
      price: l.priceText,
      type: l.type,
      lots: l.lots,
      capRate: l.capRate,
      contactName: l.contact ? l.contact.name : '',
      contactCompany: l.contact ? l.contact.company : '',
      source: l.source,
      url: l.url,
      snippet: l.snippet,
      timestamp: Date.now()
    };
    
    // Show toast
    var toast = document.getElementById('inquiry-toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'inquiry-toast';
      toast.className = 'inquiry-toast';
      document.body.appendChild(toast);
    }
    toast.innerHTML = '📧 Preparing inquiry for <strong>' + l.name + '</strong>...<br><small>AI is scraping listing for contact info</small>';
    toast.classList.add('show');
    
    // Signal via title change for AI agent detection
    document.title = 'INQUIRY_REQUEST:' + idx + ':' + l.name;

  // ─── THEME TOGGLE ──────
  function toggleTheme() {
    const html = document.documentElement;
    const current = html.getAttribute('data-theme') || 'dark';
    const next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    document.getElementById('theme-icon').textContent = next === 'dark' ? '☀️' : '🌙';
    try { localStorage.setItem('deal-scout-theme', next); } catch(e) {}
  }
  // Restore saved theme
  try {
    const saved = localStorage.getItem('deal-scout-theme');

      document.documentElement.setAttribute('data-theme', 'light');
      document.getElementById('theme-icon').textContent = '🌙';
    }
  } catch(e) {}
