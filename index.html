            margin-bottom: 30px;
        }

        .stat-card {
            background-color: #252545;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #3b82f6;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #a0a0a0;
            margin-bottom: 8px;

            letter-spacing: 0.5px;

            border-left-color: #ef4444;
        }

        .stat-card:nth-child(4) {

        }

        .tabs {

            background: none;

            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            border-bottom: 2px solid transparent;

        .tab-button:hover {
            color: #ffffff;
        }

        .tab-button.active {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            background-color: #252545;
            padding: 20px;
            border-radius: 8px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-label {
            font-size: 0.85rem;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 0.5px;

            border-radius: 6px;
            color: #e0e0e0;

        .filter-input:focus,

        .filter-buttons {

        .filter-btn {

            color: #a0a0a0;

            font-size: 0.85rem;
            font-weight: 500;

        .filter-btn:hover {
            border-color: #3b82f6;
            color: #3b82f6;
        }

        .filter-btn.active {
            background-color: #3b82f6;
            border-color: #3b82f6;
            color: #ffffff;
        }

        /* Listings Grid */
        .listings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Listing Card */
        .listing-card {
            background-color: #252545;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            border: 1px solid #333344;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .listing-card:hover {
            border-color: #3b82f6;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.15);
            transform: translateY(-4px);
        }

        .listing-card.dismissed {
            opacity: 0.4;
            pointer-events: none;
        }

        .card-actions {

            color: #1a1a2e;
        }

            font-weight: 600;
            text-transform: uppercase;

        .badge-seen {
            background-color: #6b7280;
            color: #ffffff;

            color: #ffffff;

            background-color: #ef4444;
            color: #ffffff;

        // Format date string
        function formatDate(dateStr) {
            if (!dateStr) return 'Unknown';
            const d = new Date(dateStr + 'T12:00:00');
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            return days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
        }

        // Initialize
        function init() {
            updateStats();
            renderListings();
            renderArchive();
            setupEventListeners();
            loadLocalStorageState();
        }

        // Update stats
        function updateStats() {
            const newCount = listings.filter(l => l.isNew).length;
            const hotCount = listings.filter(l => l.score >= 7).length;

            document.getElementById('statTotal').textContent = listings.length;
            document.getElementById('statNew').textContent = newCount;
            document.getElementById('statHot').textContent = hotCount;
            document.getElementById('statDate').textContent = 'Monday, Mar 9';
        }

        // Get filtered listings
        function getFilteredListings() {
            const typeFilter = document.querySelector('.filter-btn[data-filter="type"].active')?.dataset.value || '';
            const stateFilter = document.getElementById('stateFilter').value;
            const searchTerm = document.getElementById('searchFilter').value.toLowerCase();
            const scoreMin = parseInt(document.getElementById('scoreMin').value) || 0;
            const scoreMax = parseInt(document.getElementById('scoreMax').value) || 10;

            return listings.filter(listing => {
                const matchesType = !typeFilter || listing.type === typeFilter;
                const matchesState = !stateFilter || listing.location.includes(stateFilter);
                const matchesSearch = !searchTerm ||
                    listing.name.toLowerCase().includes(searchTerm) ||
                    listing.location.toLowerCase().includes(searchTerm);
                const matchesScore = listing.score >= scoreMin && listing.score <= scoreMax;

                return matchesType && matchesState && matchesSearch && matchesScore;
            });
        }

        // Sort listings
        function sortListings(listings) {
            return listings.sort((a, b) => {
                if (a.score !== b.score) {
                    return b.score - a.score;
                }
                if (a.isNew !== b.isNew) {
                    return a.isNew ? -1 : 1;
                }
                return 0;
            });
        }

        // Render listings
        function renderListings() {
            const grid = document.getElementById('listingsGrid');
            const emptyState = document.getElementById('emptyState');
            const filtered = getFilteredListings();
            const sorted = sortListings(filtered);

            if (sorted.length === 0) {
                grid.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            grid.innerHTML = sorted.map((listing, index) => {
                const state = listing.location.match(/\b([A-Z]{2})\b/)?.[1] || '';
                const scorePercent = (listing.score / 10) * 100;
                const scoreClass = listing.score >= 7 ? 'score-7-10' : listing.score >= 4 ? 'score-4-6' : 'score-1-3';

                let badges = '';
                if (listing.isNew) badges += '<span class="badge badge-new">NEW</span>';
                if (listing.isRepeat) badges += '<span class="badge badge-seen">SEEN BEFORE</span>';
                if (listing.isAuction) badges += '<span class="badge badge-auction">AUCTION</span>';
                if (listing.score >= 7) badges += '<span class="badge badge-hot">HOT DEAL</span>';
                if (listing.priceReduced) badges += '<span class="badge badge-price-drop">PRICE DROP</span>';

                return `
                    <div class="listing-card" data-index="${index}">
                        <div class="card-actions">
                            <button class="action-btn bookmark-btn" title="Bookmark">⭐</button>
                            <button class="action-btn dismiss-btn" title="Dismiss">✕</button>
                        </div>

                        <div class="badges">${badges}</div>

                        <h3 class="property-name">${listing.name}</h3>
                        <p class="property-location">${listing.location}</p>

                        <p class="property-price">${listing.priceStr}</p>
                        <span class="property-type">${listing.type}</span>

                        <div class="score-section score-${scoreClass}">
                            <div class="score-label">
                                <span class="score-label-text">Deal Score</span>
                                <span class="score-number">${listing.score}/10</span>
                            </div>
                            <div class="score-bar">
                                <div class="score-fill" style="width: ${scorePercent}%"></div>
                            </div>
                        </div>

                        <div class="card-footer">
                            <div class="source-info">
                                <div class="source-label">Source</div>
                                <div class="source-name">${listing.source}</div>
                            </div>
                            ${listing.contactName ? `
                                <div class="contact-info">
                                    <div class="contact-label">Contact</div>
                                    <div class="contact-value">${listing.contactName}</div>
                                </div>
                            ` : ''}
                            <div class="listing-date">Listed: <span>${formatDate(listing.firstSeen)}</span></div>
                            <a href="${listing.url}" target="_blank" class="open-link">View Listing →</a>
                        </div>
                    </div>
                `;
            }).join('');

            setupCardListeners();
        }

        // Setup card listeners
        function setupCardListeners() {
            document.querySelectorAll('.dismiss-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const card = btn.closest('.listing-card');
                    const index = card.dataset.index;
                    card.classList.add('dismissed');
                    localStorage.setItem(`dismissed-${index}`, 'true');
                });
            });

            document.querySelectorAll('.bookmark-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    btn.classList.toggle('bookmarked');
                    const card = btn.closest('.listing-card');
                    const index = card.dataset.index;
                    const isBookmarked = btn.classList.contains('bookmarked');
                    if (isBookmarked) {
                        localStorage.setItem(`bookmarked-${index}`, 'true');
                    } else {
                        localStorage.removeItem(`bookmarked-${index}`);
                    }
                });
            });
        }

        // Load localStorage state
        function loadLocalStorageState() {
            document.querySelectorAll('.listing-card').forEach(card => {
                const index = card.dataset.index;
                if (localStorage.getItem(`dismissed-${index}`) === 'true') {
                    card.classList.add('dismissed');
                }
                const bookmarkBtn = card.querySelector('.bookmark-btn');
                if (localStorage.getItem(`bookmarked-${index}`) === 'true') {
                    bookmarkBtn.classList.add('bookmarked');
                }
            });
        }

        // Render archive
        function renderArchive() {
            const archiveList = document.getElementById('archiveList');
            archiveList.innerHTML = ARCHIVE_INDEX.map(item => `
                <div class="archive-item">
                    <div class="archive-info">
                        <div class="archive-date">${item.date}</div>
                        <div class="archive-meta">${item.count} listings ${item.isToday ? '(Today)' : ''}</div>
                    </div>
                    <a href="${item.file}" class="archive-link">View →</a>
                </div>
            `).join('');
        }

        // Setup event listeners
        function setupEventListeners() {
            // Tab switching
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tab = btn.dataset.tab;
                    document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(tab).classList.add('active');
                });
            });

            // Type filter
            document.querySelectorAll('.filter-btn[data-filter="type"]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn[data-filter="type"]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderListings();
                });
            });

            // State filter
            document.getElementById('stateFilter').addEventListener('change', renderListings);

            // Search filter
            document.getElementById('searchFilter').addEventListener('input', renderListings);

            // Score filters
            document.getElementById('scoreMin').addEventListener('input', renderListings);
            document.getElementById('scoreMax').addEventListener('input', renderListings);
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', init);
    </script>
