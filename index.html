<style>
  :root {
    --bg: #0f1117; --card: #1a1d2e; --card2: #1e2135;
    --accent: #4f8ef7; --hot: #f7934f; --top: #f7c04f;
    --green: #4fcf8e; --red: #f74f4f; --gray: #6b7280;
    --text: #e2e8f0; --muted: #94a3b8; --border: #2d3148;
  }
  [data-theme="light"] {
    --bg: #f0f2f5; --card: #ffffff; --card2: #f8f9fb;
    --accent: #2563eb; --hot: #ea580c; --top: #d97706;
    --green: #16a34a; --red: #dc2626; --gray: #6b7280;
    --text: #1e293b; --muted: #64748b; --border: #e2e8f0;
  }
  [data-theme="light"] .chip { background: #e2e8f0; color: #334155; }
  [data-theme="light"] .chip.active { background: var(--accent); color: #fff; }
  [data-theme="light"] .tag { background: #e2e8f0; color: #334155; border-color: #cbd5e1; }
  [data-theme="light"] .tag.hot { background: #fff7ed; color: #ea580c; border-color: #fed7aa; }
  [data-theme="light"] .tag.new { background: #eff6ff; color: #2563eb; border-color: #bfdbfe; }
  [data-theme="light"] .tag.reduced { background: #fef2f2; color: #dc2626; border-color: #fecaca; }
  [data-theme="light"] input { background: #fff; color: #1e293b; border-color: #cbd5e1; }
  [data-theme="light"] .score-bar-bg { background: #e2e8f0; }
  [data-theme="light"] .header { background: linear-gradient(135deg, #e8edf5 0%, #f0f2f5 100%); }
  [data-theme="light"] .header h1, [data-theme="light"] .header .header-meta { color: #1e293b; }
  [data-theme="light"] .stat-label { color: #64748b; }
  .theme-toggle {
    position: fixed; top: 72px; right: 20px; z-index: 1000;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 50%; width: 40px; height: 40px; cursor: pointer;
    color: var(--text); font-size: 18px; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .theme-toggle { box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .theme-toggle:hover { background: var(--card2); transform: scale(1.1); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }


  /* Header */
  .header { background: linear-gradient(135deg, #1a1d2e 0%, #0f1117 100%); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 20px; font-weight: 700; color: #fff; }
  .header h1 span { color: var(--accent); }
  .header-meta { color: var(--muted); font-size: 13px; }
  .stats-bar { display: flex; gap: 20px; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat-val { font-size: 22px; font-weight: 700; color: var(--accent); }
  .stat-val.hot { color: var(--hot); }
  .stat-val.new { color: var(--green); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }


  /* Tabs */
  .tabs { display: flex; gap: 2px; background: var(--card); border-bottom: 1px solid var(--border); padding: 0 20px; }
  .tab { padding: 12px 16px; cursor: pointer; color: var(--muted); font-size: 13px; font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }


  /* Filter bar */
  .filter-bar { background: var(--card); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 12px; transition: all 0.15s; }
  .filter-btn:hover, .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .filter-btn.hot-filter.active { background: var(--hot); border-color: var(--hot); }
  .search-box { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 12px; outline: none; width: 200px; }
  .search-box:focus { border-color: var(--accent); }


  /* Listings grid */
  .listings { padding: 16px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 14px; }


  /* Card */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; position: relative; transition: border-color 0.15s; }
  .card:hover { border-color: var(--accent); }
  .card.dismissed { display: none; }
  .card.bookmarked { border-color: var(--top); }
  .card.top-deal { border-left: 3px solid var(--top); }
  .card.hot-deal { border-left: 3px solid var(--hot); }


  /* Card header */
  .card-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
  .card-title { flex: 1; font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .card-title a { color: var(--text); }
  .card-title a:hover { color: var(--accent); text-decoration: none; }
  .card-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .btn-icon { background: transparent; border: none; cursor: pointer; color: var(--muted); font-size: 16px; padding: 2px 4px; line-height: 1; transition: color 0.15s; }
  .btn-icon:hover { color: var(--text); }
  .btn-icon.bookmarked { color: var(--top); }


  /* Badges */
  .badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
  .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
  .badge-new { background: rgba(79,207,142,0.2); color: var(--green); border: 1px solid rgba(79,207,142,0.3); }
  .badge-price-drop { background: rgba(247,79,79,0.2); color: var(--red); border: 1px solid rgba(247,79,79,0.3); }
  .badge-seen { background: rgba(107,114,128,0.2); color: var(--gray); border: 1px solid rgba(107,114,128,0.3); }
  .badge-auction { background: rgba(249,115,22,0.2); color: #f97316; border: 1px solid rgba(249,115,22,0.3); }
  .badge-hot { background: rgba(247,147,79,0.2); color: var(--hot); border: 1px solid rgba(247,147,79,0.3); }
  .badge-top { background: rgba(247,192,79,0.2); color: var(--top); border: 1px solid rgba(247,192,79,0.3); }
  .badge-type { background: rgba(79,142,247,0.15); color: var(--accent); border: 1px solid rgba(79,142,247,0.25); }
  .badge-sf { background: rgba(79,207,142,0.15); color: #34d399; border: 1px solid rgba(79,207,142,0.25); }


  /* Price row */
  .price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
  .price { font-size: 20px; font-weight: 700; color: #fff; }
  .old-price { font-size: 14px; color: var(--muted); text-decoration: line-through; }
  .drop-pct { font-size: 12px; color: var(--red); font-weight: 600; }


  /* Details grid */
  .details { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 12px; margin-bottom: 10px; }
  .detail { font-size: 12px; color: var(--muted); }
  .detail strong { color: var(--text); }
  .detail.cap { color: var(--green); font-weight: 600; }


  /* Score bar */
  .score-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .score-label { font-size: 11px; color: var(--muted); width: 40px; flex-shrink: 0; }
  .score-bar-wrap { flex: 1; background: rgba(255,255,255,0.06); border-radius: 4px; height: 6px; }
  .score-bar { height: 6px; border-radius: 4px; transition: width 0.3s; }
  .score-num { font-size: 12px; font-weight: 700; width: 24px; text-align: right; }


  /* Snippet */
  .snippet { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 8px; border-top: 1px solid var(--border); padding-top: 8px; }


  /* Contact */
  .contact { font-size: 12px; color: var(--muted); }
  .contact strong { color: var(--text); }


  /* Source */
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .source-tag { font-size: 11px; color: var(--muted); }
  .view-btn { font-size: 11px; color: var(--accent); font-weight: 600; }


  /* Archive tab */
  .archive-list { padding: 20px; display: grid; gap: 10px; max-width: 600px; }
  .archive-item { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
  .archive-item.today { border-color: var(--accent); }
  .archive-date { font-weight: 600; color: var(--text); }
  .archive-meta { font-size: 12px; color: var(--muted); }
  .archive-link { font-size: 12px; color: var(--accent); }


  /* Empty state */
  .empty { padding: 60px 20px; text-align: center; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }


  /* Responsive */
  @media (max-width: 600px) {
    .listings { grid-template-columns: 1fr; padding: 12px; }
    .stats-bar { gap: 12px; }
  }

// ─── STATE ──────────────────────────────────────────────────────────────────
const dismissed = new Set(JSON.parse(localStorage.getItem('dismissed') || '[]'));
const bookmarks = new Set(JSON.parse(localStorage.getItem('bookmarks') || '[]'));
let currentFilter = 'all';
let searchQuery = '';


function saveState() {
  localStorage.setItem('dismissed', JSON.stringify([...dismissed]));
  localStorage.setItem('bookmarks', JSON.stringify([...bookmarks]));
}


// ─── RENDER ──────────────────────────────────────────────────────────────────
function scoreColor(s) {
  if (s >= 9) return '#f7c04f';
  if (s >= 7) return '#f7934f';
  if (s >= 5) return '#4f8ef7';
  return '#6b7280';
}


function formatPrice(p) {
  if (!p) return 'Call for Price';
  if (p >= 1000000) return '$' + (p/1000000).toFixed(2).replace(/\.?0+$/, '') + 'M';
  return '$' + p.toLocaleString();
}


function renderCard(l) {
  const isBookmarked = bookmarks.has(l.id);
    let dateHtml = '';
    if (l.dom !== undefined) {
      const dom = l.dom;
      dateHtml = '<div class="listing-date">';
      if (dom > 0) {
        dateHtml += '<span class="dom">' + dom + ' day' + (dom !== 1 ? 's' : '') + ' on market</span>';
      } else {
        dateHtml += '<span class="dom">NEW TODAY</span>';
      }
      dateHtml += '</div>';
    }
  const cardClass = ['card', l.score >= 9 ? 'top-deal' : l.score >= 7 ? 'hot-deal' : '', dismissed.has(l.id) ? 'dismissed' : '', isBookmarked ? 'bookmarked' : ''].filter(Boolean).join(' ');


  const badges = [];
  if (l.isNew) badges.push('<span class="badge badge-new">NEW</span>');
  if (l.priceChanged) badges.push(`<span class="badge badge-price-drop">PRICE DROP ▼</span>`);
  if (l.isRepeat && !l.priceChanged) badges.push('<span class="badge badge-seen">SEEN BEFORE</span>');
  if (l.isAuction) badges.push('<span class="badge badge-auction">AUCTION</span>');
  if (l.score >= 9) badges.push('<span class="badge badge-top">⭐ TOP DEAL</span>');
  else if (l.score >= 7) badges.push('<span class="badge badge-hot">🔥 HOT</span>');
  if (l.sellerFinancing) badges.push('<span class="badge badge-sf">Seller Fin</span>');


  const priceBlock = l.priceChanged && l.oldPrice
    ? `<div class="price-row"><span class="price">${l.priceText}</span><span class="old-price">${formatPrice(l.oldPrice)}</span><span class="drop-pct">▼${Math.round((1-l.price/l.oldPrice)*100)}%</span></div>`
    : `<div class="price-row"><span class="price">${l.priceText}</span></div>`;


  const detailItems = [
    l.location ? `<div class="detail">📍 <strong>${l.location}</strong></div>` : '',
    l.lots ? `<div class="detail">📊 <strong>${l.lots} lots/sites</strong></div>` : '',
    l.capRate ? `<div class="detail cap">📈 Cap Rate: <strong>${l.capRate}</strong></div>` : '',
    l.occupancy ? `<div class="detail">🏠 Occupancy: <strong>${l.occupancy}</strong></div>` : '',
    l.hasWaterfront ? `<div class="detail">💧 <strong>Waterfront</strong></div>` : '',
    l.nearTourism ? `<div class="detail">🎯 <strong>Near Tourism</strong></div>` : '',
    l.nearInterstate ? `<div class="detail">🛣️ <strong>Near Interstate</strong></div>` : '',
  ].filter(Boolean).join('');


  const tagHTML = l.tags.map(t => `<span class="badge badge-type">${t}</span>`).join('');


  return `
  <div class="${cardClass}" data-id="${l.id}" data-type="${l.type}" data-new="${l.isNew}" data-sf="${l.sellerFinancing}" data-score="${l.score}" data-name="${l.name.toLowerCase()} ${l.location.toLowerCase()}" data-contact-name="${(l.contact&&l.contact.name)||''}" data-contact-phone="${(l.contact&&l.contact.phone)||''}" data-contact-email="${(l.contact&&l.contact.email)||''}" data-url="${l.url}">
    <div class="card-header">
      <div class="card-title"><a href="${l.url}" target="_blank">${l.name}</a></div>
      <div class="card-actions">
        <button class="btn-icon ${isBookmarked ? 'bookmarked' : ''}" title="${isBookmarked ? 'Remove bookmark' : 'Bookmark'}" onclick="toggleBookmark('${l.id}', this)">${isBookmarked ? '★' : '☆'}</button>
        <button class="btn-icon" title="Dismiss" onclick="dismiss('${l.id}', this)">✕</button>
      </div>
    </div>
    <div class="badges">${badges.join('')}</div>
    ${priceBlock}
    <div class="details">${detailItems}</div>
    <div class="score-row">
      <span class="score-label">Score</span>
      <div class="score-bar-wrap"><div class="score-bar" style="width:${l.score*10}%;background:${scoreColor(l.score)}"></div></div>
      <span class="score-num" style="color:${scoreColor(l.score)}">${l.score}/10</span>
    </div>
    <div class="badges">${tagHTML}</div>
    <div class="snippet">${l.snippet}</div>
    ${l.contact && l.contact.name ? `<div class="contact">👤 <strong>${l.contact.name}</strong>${l.contact.firm ? ' · ' + l.contact.firm : ''}${l.contact.phone ? ' · ' + l.contact.phone : ''}</div>` : ''}
    
    ${dateHtml}
    <div class="card-footer">
      <span class="source-tag">${l.source}</span>
      <button class="view-btn" onclick="openContactModal(this.closest('[data-id]').dataset)">Contact Listing →</button>
    </div>
  </div>`;
}


function getFiltered() {
  return LISTINGS.filter(l => {
    if (dismissed.has(l.id)) return false;
    if (currentFilter === 'hot' && l.score < 7) return false;
    if (currentFilter === 'new' && !l.isNew) return false;
    if (currentFilter === 'sf' && !l.sellerFinancing) return false;
    if (currentFilter === 'rv' && l.type !== 'rv') return false;
    if (currentFilter === 'mhp' && l.type !== 'mhp') return false;
    if (currentFilter === 'storage' && l.type !== 'storage') return false;
    if (currentFilter === 'marina' && l.type !== 'marina') return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const haystack = (l.name + ' ' + l.location + ' ' + l.snippet + ' ' + l.tags.join(' ')).toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
}


function renderListings() {
  const filtered = getFiltered();
  const grid = document.getElementById('listings-grid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div>No listings match your filter.</div></div>';
  } else {
    grid.innerHTML = filtered.map(renderCard).join('');
  }
  updateStats();
  setTimeout(function(){if(typeof window.injectPanels==='function')window.injectPanels();},50);
}


function renderBookmarks() {
  const bookmarked = LISTINGS.filter(l => bookmarks.has(l.id));
  const grid = document.getElementById('bookmarks-grid');
  if (!bookmarked.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">⭐</div><div>No bookmarks yet. Star listings to save them here.</div></div>';
  } else {
    grid.innerHTML = bookmarked.map(renderCard).join('');
  }
}


function renderArchive() {
    var list = document.getElementById('archive-list');
    if (!list) return;
    var dupeInfo = '';
    if (typeof SEEN_INDEX !== 'undefined' && Object.keys(SEEN_INDEX).length > 0) {
      var totalSeen = Object.keys(SEEN_INDEX).length;
      var repeatCount = LISTINGS.filter(function(l) { return l.isRepeat; }).length;
      dupeInfo = '<div class="archive-stats"><span class="archive-stat">Tracked: ' + totalSeen + ' unique</span><span class="archive-stat">Repeats today: ' + repeatCount + '</span></div>';
    }

<script>
// --- History System ---
var HISTORY_STORE = {};
var currentViewDate = null;


function loadDay(date) {
  var archiveEntry = ARCHIVE_INDEX.find(function(a) { return a.date === date; });
  if (!archiveEntry) return;
  if (archiveEntry.isToday) {
    currentViewDate = null;
    renderListings();
    injectPanels();
    switchTab('today', document.querySelector('.tabs').children[0]);
    var eb = document.getElementById('history-banner');
    if (eb) eb.remove();
    return;
  }
  if (HISTORY_STORE[date]) {
    displayHistoricalData(date, HISTORY_STORE[date]);
    return;
  }
  fetch('./data/' + date + '.json').then(function(r) {
    if (!r.ok) throw new Error('Not found');
    return r.json();
  }).then(function(data) {
    HISTORY_STORE[date] = data;
    displayHistoricalData(date, data);
  }).catch(function(e) {
    showArchiveMessage(date, archiveEntry.count);
  });
}


function displayHistoricalData(date, listings) {
  currentViewDate = date;
  var grid = document.getElementById('listings-grid');
  if (!grid) return;
  grid.innerHTML = listings.map(function(l) { return renderCard(l); }).join('');
  injectPanels();
  switchTab('today', document.querySelector('.tabs').children[0]);
  updateHistoryBanner(date);
  updateStats(listings);
}


function updateHistoryBanner(date) {
  var existing = document.getElementById('history-banner');
  if (existing) existing.remove();
  if (!date) return;
  var banner = document.createElement('div');
  banner.id = 'history-banner';
  banner.className = 'history-banner';
  banner.innerHTML = 'Viewing archive: <strong>' + date + '</strong> <button onclick="loadDay(ARCHIVE_INDEX.find(function(a){return a.isToday}).date)" class="banner-btn">Back to Today</button>';
  var tabs = document.querySelector('.tabs');
  if (tabs) tabs.parentNode.insertBefore(banner, tabs.nextSibling);
}


function showArchiveMessage(date, count) {
  switchTab('today', document.querySelector('.tabs').children[0]);
  var grid = document.getElementById('listings-grid');
  if (grid) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">Archive</div><h3>' + date + '</h3><p>' + count + ' listings were found on this date.</p><p style="color:var(--muted);margin-top:8px;">Historical data will be available once the daily scraper archives them.</p><button onclick="loadDay(ARCHIVE_INDEX.find(function(a){return a.isToday}).date)" style="margin-top:12px;padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;">Back to Today</button></div>';
  }
  updateHistoryBanner(date);
}


// --- AI Analysis Generator ---
function generateAIAnalysis(listing) {
  var highlights = [];
  var verdict = '';
  var thesis = '';
  var score = listing.score || 0;
  var sf = listing.sellerFinancing;
  var wf = listing.hasWaterfront;
  var ni = listing.nearInterstate;
  var nt = listing.nearTourism;
  var lots = listing.lots || 0;
  var cap = listing.capRate ? parseFloat(listing.capRate) : 0;
  var price = listing.price || 0;
  var ppl = (price > 0 && lots > 0) ? Math.round(price / lots) : 0;
  var reduced = listing.priceChanged;
  var dom = listing.dom || 0;


  if (cap >= 8) highlights.push(cap.toFixed(1) + '% cap rate');
  if (sf) highlights.push('Seller financing');
  if (wf) highlights.push('Waterfront');
  if (ni) highlights.push('Interstate access');
  if (nt) highlights.push('Tourism corridor');
  if (lots >= 50) highlights.push(lots + ' lots/sites');
  if (ppl > 0 && ppl < 10000) highlights.push('$' + ppl.toLocaleString() + '/lot');
  if (reduced) highlights.push('Price reduced');
  if (dom > 180) highlights.push(dom + ' DOM');


  if (score >= 7) {
    verdict = 'Strong Buy';
    if (sf) verdict += ' - Financing';
    else if (wf) verdict += ' - Premium';
    else if (cap >= 9) verdict += ' - High Yield';
  } else if (score >= 5) {
    verdict = 'Buy';
    if (reduced) verdict += ' - Reduced';
    else if (lots >= 50) verdict += ' - Scale';
  } else if (score >= 3) {
    verdict = 'Watch';
    if (reduced) verdict += ' - Dropping';
    else if (dom > 180) verdict += ' - Negotiate';
  } else {
    verdict = 'Pass';
    if (price === 0) verdict += ' - No Data';
  }


  var types = {rv:'RV park',mhp:'MHP',storage:'self-storage',marina:'marina',camp:'campground'};
  var tn = types[listing.type] || 'property';
  var loc = listing.location || 'Unknown';


  if (score >= 7) {
    thesis = loc + ' ' + tn + (ppl > 0 ? ' at $' + ppl.toLocaleString() + '/lot' : '') + ' scores well across multiple signals.';
    if (sf) thesis += ' Seller financing reduces entry barrier.';
    if (wf) thesis += ' Waterfront premium supports appreciation.';
    if (nt) thesis += ' Tourism drives revenue upside.';
    thesis += ' Worth pursuing quickly.';
  } else if (score >= 4) {
    thesis = tn + ' in ' + loc + ' has moderate potential.';
    if (highlights.length > 0) thesis += ' Key: ' + highlights.slice(0,3).join(', ') + '.';
    thesis += ' Recommend deeper diligence.';
  } else if (score >= 2) {
    thesis = loc + ' ' + tn + ' shows limited signals.';
    thesis += price === 0 ? ' Request financials.' : ' Below-market without value-add.';
    thesis += ' Monitor for changes.';
  } else {
    thesis = 'Insufficient signals for ' + tn + ' in ' + loc + '. Missing key data for underwriting.';
  }


  return { verdict: verdict, highlights: highlights.length > 0 ? highlights : ['Limited data'], thesis: thesis, score: score };
}


function injectPanels() {
  var cards = document.querySelectorAll('.card');
  var src = currentViewDate && HISTORY_STORE[currentViewDate] ? HISTORY_STORE[currentViewDate] : LISTINGS;
  cards.forEach(function(card) {
    if (card.querySelector('.ai-summary-toggle')) return;
    var cid = card.dataset.id;
    var listing = src.find(function(l) { return l.id === cid; });
    if (!listing) return;
    var ai = generateAIAnalysis(listing);
    var footer = card.querySelector('.card-footer');
    if (!footer) return;
    var toggle = document.createElement('div');
    toggle.className = 'ai-summary-toggle';
    toggle.innerHTML = '<span class="ai-icon">AI</span> Analysis <span class="ai-verdict-badge ' + (ai.score >= 7 ? 'hot' : ai.score >= 4 ? 'warm' : 'cool') + '">' + ai.verdict + '</span> <span class="chevron">v</span>';
    var content = document.createElement('div');
    content.className = 'ai-summary';
    content.style.display = 'none';
    content.innerHTML = '<div class="ai-highlights">' + ai.highlights.map(function(h) { return '<span class="ai-tag">' + h + '</span>'; }).join('') + '</div><div class="ai-thesis">' + ai.thesis + '</div>';
    toggle.addEventListener('click', function() {
      var open = content.style.display !== 'none';
      content.style.display = open ? 'none' : 'block';
      toggle.classList.toggle('open', !open);
    });
    footer.parentNode.insertBefore(toggle, footer);
    footer.parentNode.insertBefore(content, footer);
  });
}


setTimeout(injectPanels, 100);


function toggleTheme() {
    const html = document.documentElement;
    const current = html.getAttribute('data-theme') || 'dark';
    const next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    document.getElementById('theme-icon').textContent = next === 'dark' ? '☀️' : '🌙';
    try { localStorage.setItem('deal-scout-theme', next); } catch(e) {}
  }
  // Restore saved theme
  try {
    const saved = localStorage.getItem('deal-scout-theme');
    if (saved === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
      document.getElementById('theme-icon').textContent = '🌙';
    }
  } catch(e) {}
</script>

  <script>
  function openContactModal(ds) {
    var name  = ds.contactName  || '';
    var phone = ds.contactPhone || '';
    var email = ds.contactEmail || '';
    var url   = ds.url          || '#';
    // Get listing name + source from the card
    var card = document.querySelector('[data-url="'+url+'"]');
    var listingName = card ? (card.querySelector('.card-title a') || card.querySelector('.card-title')||{}).textContent||'' : '';
    var source      = card ? (card.querySelector('.source-tag')||{}).textContent||'' : '';
    var loc         = card ? (card.querySelector('.detail strong')||{}).textContent||'' : '';

    document.getElementById('modal-listing-name').textContent = listingName.trim();
    document.getElementById('modal-source-loc').textContent   = [source, loc].filter(Boolean).join(' · ');
    document.getElementById('modal-view-full').href           = url;

    var rows = '';
    if (name)  rows += '<div class="modal-contact-row"><span class="icon">&#x1F464;</span><strong>'+name+'</strong></div>';
    if (phone) rows += '<div class="modal-contact-row"><span class="icon">&#x1F4DE;</span><a href="tel:'+phone+'">'+phone+'</a></div>';
    if (email) rows += '<div class="modal-contact-row"><span class="icon">&#x2709;&#xFE0F;</span><a href="mailto:'+email+'">'+email+'</a></div>';
    if (!name && !phone && !email) {
      rows = '<div class="modal-no-contact">No direct contact on file &#x2014; click below to reach broker on the listing page.</div>';
    }
    document.getElementById('modal-contact-rows').innerHTML = rows;
    document.getElementById('contact-modal').classList.add('open');
  }
  function closeContactModal() {
    document.getElementById('contact-modal').classList.remove('open');
  }
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeContactModal(); });
  </script>
